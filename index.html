<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxim Ponomarev | Linktree</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1d1d1f;
            --accent-blue: #0071e3;
            --secondary-text: #86868b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 30px; /* Стиль иконок iOS */
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }

        .subtitle {
            color: var(--secondary-text);
            font-size: 17px;
            margin-bottom: 35px;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 18px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 17px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            transform: scale(1.02);
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0077ed;
        }

        footer {
            margin-top: 50px;
            font-size: 12px;
            color: var(--secondary-text);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.com/pnmrev.png" alt="Profile" class="profile-img">
    
    <h1>Home</h1>
    <p class="subtitle">Подпись/p>

    <div class="links-stack">
        <a href="https://t.me/your_channel" class="btn btn-primary">Telegram Канал</a>
        <a href="https://discord.gg/your_invite" class="btn">Discord Сообщество</a>
        <a href="https://youtube.com/@your_channel" class="btn">YouTube Канал</a>
        <a href="https://github.com/pnmrev" class="btn">Мой GitHub</a>
    </div>

    <footer>
        
    </footer>
</div>

</body>
</html>
