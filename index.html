<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Home</title>
    
    <link rel="icon" type="image/jpeg" href="logo.JPG">
    <link rel="apple-touch-icon" href="logo.JPG">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Home">

    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1d1d1f;
            --secondary-text: #86868b;
            --discord-color: #5865F2;
            --btn-hover: #ffffff;
        }

        /* Темная тема */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(28, 28, 30, 0.8);
                --text-color: #f5f5f7;
                --secondary-text: #86868b;
                --btn-hover: #2c2c2e;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease;
            overflow: hidden;
            /* Оптимизация шрифтов */
            text-rendering: optimizeLegibility;
            word-break: break-word;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            /* Плавное появление при загрузке */
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            object-fit: cover;
            /* Сквиркл Apple */
            clip-path: inset(0 round 22%);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 35px 0;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 18px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 17px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Запрет выделения текста */
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (prefers-color-scheme: dark) {
            .btn {
                border: 1px solid rgba(255,255,255,0.1);
            }
        }

        .btn:hover {
            transform: scale(1.02);
            background-color: var(--btn-hover);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Эффект нажатия */
        .btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .btn-discord {
            background-color: var(--discord-color);
            color: white;
            border: none;
        }

        .btn-discord:hover {
            background-color: #4752c4;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.JPG" alt="Logo" class="profile-img">
    
    <h1>Home</h1>

    <div class="links-stack">
        <a href="https://discord.gg/invite" class="btn btn-discord">Discord</a>
        
        <a href="#" class="btn">First</a>
        <a href="#" class="btn">Second</a>
        <a href="#" class="btn">Third</a>
    </div>
</div>

</body>
</html>
